<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Object Detection Application</title>
        <link rel="stylesheet" href="/static/styles.css" />
        <link
            href="https://unpkg.com/maplibre-gl@4.5.2/dist/maplibre-gl.css"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/maplibre-gl@4.5.2/dist/maplibre-gl.js"></script>
    </head>

    <body>
        <div class="container">
            <h1>Upload an Image to Apply Object Detection</h1>

            <form
                id="upload-form"
                action="/object-detection/"
                method="post"
                enctype="multipart/form-data"
            >
                <label for="image">Select Image:</label>
                <input
                    type="number"
                    id="confidence"
                    name="confidence"
                    value="0.5"
                    min="0"
                    max="1"
                    step="0.1"
                />
                <input
                    type="file"
                    id="image"
                    name="image"
                    accept="image/*"
                    required
                /><br /><br />
                <input type="submit" value="Upload and Apply Detection" />
            </form>

            <br />
            <h2>Output Image:</h2>
            <img id="output-image" src="" />
            <br />
            <a id="download-link" href="" download="output.png"
                >Download Image</a
            >
            <br />

            <div id="output-condition">
                <br />
                You have following condition:
                <ul></ul>
            </div>

            <button id="toggleMapBtn" onclick="toggleMap()" type="button">
                Open the map
            </button>
        </div>

        <div id="map-section">
            <div id="map-wrapper">
                <div id="map"></div>

                <button
                    id="panelToggleBtn"
                    onclick="togglePanel()"
                    title="Hide panel"
                >
                    ✕
                </button>

                <div id="map-panel">
                    <div class="panel-header">
                        <div class="panel-title">🗺 Explorer</div>
                        <button
                            class="panel-close-btn"
                            onclick="togglePanel()"
                            title="Hide panel"
                        >
                            ✕
                        </button>
                    </div>
                    <div class="divider"></div>

                    <button id="locateBtn" onclick="locateUser()">
                        ◎ Locate Me
                    </button>

                    <div id="coordsBadge">
                        <div class="sdot" style="background: #4a90e2"></div>
                        <div id="locationInfo">
                            <div id="locationName" class="location-name">
                                Locating…
                            </div>
                            <div id="locationAddr" class="location-addr"></div>
                            <div class="location-coords">
                                Lat <span id="latVal">—</span> &nbsp; Lng
                                <span id="lngVal">—</span>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="search-row">
                        <input
                            id="searchInput"
                            type="text"
                            placeholder="Search any place…"
                            onkeydown="
                                if (event.key === 'Enter') searchPlaces();
                            "
                        />
                        <button id="searchBtn" onclick="searchPlaces()">
                            Go
                        </button>
                    </div>

                    <div id="map-status">
                        <div class="sdot"></div>
                        <span id="statusText">Ready</span>
                    </div>

                    <div id="map-results"></div>
                </div>
            </div>
        </div>

        <script src="/static/script.js" async />
    </body>
</html>
